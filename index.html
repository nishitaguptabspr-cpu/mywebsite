<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
  margin:0;
  padding:0;
  font-family:'Comic Sans MS', cursive;
  overflow:hidden;
  background:linear-gradient(to bottom, #ffb6c1, #ff69b4);
}

.slide{
  display:none;
  height:100vh;
  width:100%;
  position:absolute;
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  color:white;
}

.active{
  display:flex;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff1493;
  color:white;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}

.card{
  background:white;
  color:#ff1493;
  padding:20px;
  border-radius:15px;
  width:80%;
  max-width:300px;
}
</style>
</head>

<body>

<!-- Slide 1 -->
<div class="slide active">
  <h2>💖 Make A Wish 💖</h2>
  <h1>🎂 Happy Birthday 🎂</h1>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- Slide 2 -->
<div class="slide">
  <h2>🎉 Celebration Time 🎉</h2>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- Slide 3 -->
<div class="slide">
  <div class="card">
    <h3>💌 Special Message 💌</h3>
    <p>
      You are my best friend and favorite human 💖<br>
      I wish you unlimited happiness and success ✨<br>
      Stay amazing! 🌈
    </p>
  </div>
  <button onclick="nextSlide()">Back to Start 🔁</button>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let current = 0;

function nextSlide(){
  slides[current].classList.remove("active");
  current++;
  if(current >= slides.length){
    current = 0;
  }
  slides[current].classList.add("active");
}
</script>

</body>
</html>
