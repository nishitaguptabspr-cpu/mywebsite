<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Magic</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
}

.container{
  width:300%;
  height:100vh;
  display:flex;
  transition:transform 0.8s ease-in-out;
}

.slide{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1,h2,p{
  color:#fff;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4081;
  font-weight:bold;
  margin-top:20px;
  cursor:pointer;
}

.cake{
  font-size:100px;
  position:relative;
}

.flame{
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  animation:flicker 0.5s infinite alternate;
}

@keyframes flicker{
  from{opacity:1;}
  to{opacity:0.3;}
}

img{
  width:220px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container" id="slides">

  <!-- Slide 1 -->
  <div class="slide">
    <div class="cake">
      🎂
      <div class="flame" id="flame">🕯️</div>
    </div>
    <h2>Make a Wish ✨</h2>
    <button onclick="blow()">Blow Candle 💨</button>
  </div>

  <!-- Slide 2 -->
  <div class="slide">
    <h1>🎉 Celebration Time 🎉</h1>
    <h2>🎂 Happy Birthday 🎂</h2>
    <button onclick="next()">Next ➡</button>
  </div>

  <!-- Slide 3 -->
  <div class="slide">
    <h1>💖 Special Message 💖</h1>
    <img src="n.jpg" alt="Birthday Photo">
    <p>You are truly special 💕<br>May all your dreams come true ✨</p>
    <button onclick="restart()">Start Again 🔁</button>
  </div>

</div>

<script>
let index = 0;
let slides = document.getElementById("slides");

function blow(){
  document.getElementById("flame").style.display="none";
  setTimeout(function(){
    index = 1;
    slides.style.transform = "translateX(-100%)";
  },800);
}

function next(){
  index = 2;
  slides.style.transform = "translateX(-200%)";
}

function restart(){
  index = 0;
  slides.style.transform = "translateX(0%)";
  document.getElementById("flame").style.display="block";
}
</script>

</body>
</html>
