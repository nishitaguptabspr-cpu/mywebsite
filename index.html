<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Slides</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  scroll-behavior:smooth;
}

.section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  color:white;
}

#slide1{ background:#ff6b81; }
#slide2{ background:#ff4757; }
#slide3{ background:#e84393; }

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#e84393;
  font-size:16px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="section" id="slide1">
  <h1>💖 Make A Wish 💖</h1>
  <a href="#slide2"><button>Next ➡</button></a>
</div>

<div class="section" id="slide2">
  <h1>🎂 Happy Birthday 🎂</h1>
  <a href="#slide3"><button>Next ➡</button></a>
</div>

<div class="section" id="slide3">
  <h1>🎉 Celebration Time 🎉</h1>
  <p>You are amazing! Stay happy always ✨</p>
  <a href="#slide1"><button>Start Again 🔁</button></a>
</div>

</body>
</html>
