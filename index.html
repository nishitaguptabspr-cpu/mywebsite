<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Slides</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background:#ffb6c1;
}

.slide{
  display:none;
  height:100vh;
  width:100%;
  position:absolute;
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  color:#c2185b;
}

.active{
  display:flex;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff1493;
  color:white;
  font-size:16px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="slide active">
  <h1>💖 Make A Wish 💖</h1>
  <h2>🎂 Happy Birthday 🎂</h2>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<div class="slide">
  <h1>🎉 Celebration Time 🎉</h1>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<div class="slide">
  <h1>💌 Special Message 💌</h1>
  <p>You are amazing. Stay happy always! ✨</p>
  <button onclick="nextSlide()">Start Again 🔁</button>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let current = 0;

function nextSlide(){
  slides[current].classList.remove("active");
  current++;
  if(current >= slides.length){
    current = 0;
  }
  slides[current].classList.add("active");
}
</script>

</body>
</html>
