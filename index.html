<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#ffb6c1;
}

.slide{
  display:none;
  height:100vh;
  position:absolute;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.active{
  display:flex;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff1493;
  color:white;
  margin-top:20px;
}

img{
  width:220px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="slide active">
  <h2>🕯️ Blow the Candle</h2>
  <div style="font-size:80px;">🎂</div>
  <button onclick="nextSlide()">Blow 💨</button>
</div>

<div class="slide">
  <h1>🎉 Happy Birthday 🎉</h1>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<div class="slide">
  <h2>💖 Special Message 💖</h2>
  <img src="PASTE-YOUR-IMAGE-LINK-HERE">
  <p>You are amazing 💕</p>
  <button onclick="restart()">Start Again 🔁</button>
</div>

<script>
let slides=document.querySelectorAll(".slide");
let current=0;

function nextSlide(){
  slides[current].classList.remove("active");
  current++;
  slides[current].classList.add("active");
}

function restart(){
  slides[current].classList.remove("active");
  current=0;
  slides[current].classList.add("active");
}
</script>

</body>
</html>
