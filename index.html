<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background:#ffb6c1;
}

/* Slides */
.slide{
  display:none;
  height:100vh;
  width:100%;
  position:absolute;
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.slide.active{
  display:flex;
}

/* Cake */
.cake{
  font-size:80px;
}

.flame{
  font-size:40px;
  animation:flicker 0.5s infinite alternate;
}

@keyframes flicker{
  from{ opacity:1; }
  to{ opacity:0.4; }
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff1493;
  color:white;
  font-size:16px;
  margin-top:20px;
}

/* Photo */
img{
  width:200px;
  border-radius:20px;
  margin-top:15px;
}
</style>
</head>

<body>

<!-- Slide 1 -->
<div class="slide active">
  <div class="flame" id="flame">🕯️</div>
  <div class="cake">🎂</div>
  <h2>Click to Blow the Candle</h2>
  <button onclick="blowCandle()">Blow Candle 💨</button>
</div>

<!-- Slide 2 -->
<div class="slide">
  <h1>🎉 Celebration Time 🎉</h1>
  <h2>🎂 Happy Birthday 🎂</h2>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- Slide 3 -->
<div class="slide">
  <h1>💖 Special Message 💖</h1>
  <img src="amannnnn.jpg" alt="Birthday Photo">
  <p>
    You are amazing 💕 <br>
    May your life be full of happiness ✨
  </p>
  <button onclick="restart()">Start Again 🔁</button>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let current = 0;

function blowCandle(){
  document.getElementById("flame").style.display="none";
  setTimeout(function(){
    nextSlide();
  },1000);
}

function nextSlide(){
  slides[current].classList.remove("active");
  current++;
  slides[current].classList.add("active");
}

function restart(){
  slides[current].classList.remove("active");
  current = 0;
  slides[current].classList.add("active");
  document.getElementById("flame").style.display="block";
}
</script>

</body>
</html>
